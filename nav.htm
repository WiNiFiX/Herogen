<html>
<head>
<script src="form.js">
</script>
<script language="Javascript">
function update_mutant_link()
{
  try {
    var f = parent.frames[0].document.forms[0];
    var isMutant = get_species(f) === 'Mutant';
    document.getElementById('mutant-link').style.display = isMutant ? '' : 'none';
    document.getElementById('mutant-sep').style.display  = isMutant ? '' : 'none';
  } catch(e) {}
}
</script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  overflow: hidden;
}
body {
  background: #1e293b;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  display: flex;
  align-items: center;
  padding: 0 10px;
  gap: 2px;
  flex-wrap: wrap;
}
a {
  color: #94a3b8;
  text-decoration: none;
  font-size: 11.5px;
  font-weight: 500;
  padding: 4px 7px;
  border-radius: 5px;
  white-space: nowrap;
  transition: background 0.15s, color 0.15s;
  cursor: pointer;
}
a:hover {
  color: #f1f5f9;
  background: #334155;
}
.sep {
  color: #334155;
  font-size: 11px;
  padding: 0 1px;
  user-select: none;
}
</style>
</head>
<body onLoad="update_mutant_link()">
  <a href="javascript:void(0)" onclick="window.open('skills.htm','skills','resizable,status')">Skills</a>
  <span class="sep" id="mutant-sep" style="display:none">|</span>
  <a id="mutant-link" href="javascript:void(0)" onclick="window.open('mutant.htm','mutant','menubar,resizable,status')" style="display:none">Mutations</a>
</body>
</html>
